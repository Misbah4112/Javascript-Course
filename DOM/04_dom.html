<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom</title>

</head>
<body style="background-color: gray;">
    
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>
<script>
     function addLanguage(langName){
       const li = document.createElement('li')
       li.innerHTML = `${langName}`
       document.querySelector('.language').appendChild(li)

    }
 addLanguage("python")
  addLanguage("java")

  function addOptiLanguage(langName){
    const li = document.createElement('li')
    document.appendChild(document.createTextNode(langName))
    document.querySelector('.language').appendChild(li)

}

addOptiLanguage("golang")

//both functions do the same work but the secodn function is a more optimized approach because it does not involve traversing every element like in the first function


const second_lang = document.querySelector("li:nth-child(2)")
//second_lang.innerHTML = "Mojo"
const newli = document.createElement('li')
newli.textContent = "mojo"
second_lang.replaceWith(newli)

//edit
const firstLang = document.querySelector("li:first-child")
firstLang.outerHTML = '<li>Typescript</li>' //changes Javascript to typescript

//remove

const lastLang = document.querySelector('li:last-child')
lastLang.remove()


</script>
</html>
